<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Kiyori × Aki — Cocktail Specs</title>
<meta name="description" content="Flashcard study tool for cocktail specs at Kiyori and Aki, Cavendish Square, London.">
<meta name="theme-color" content="#1c1d20">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231c1d20'/%3E%3Crect x='38' y='20' width='6' height='60' rx='3' fill='%23d64560'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header>
    <div>
      <div class="brand-mark">Kiyori × Aki</div>
      <h1>Cocktail Specs</h1>
    </div>
    <div class="subhead">Spec Study<br>Cavendish Sq</div>
  </header>

  <div class="venue-toggle" id="venue-toggle"></div>
  <div class="filters" id="filters"></div>

  <div class="counter">
    <span><span class="position" id="pos">01</span> / <span id="total">00</span></span>
    <span id="filter-label">All</span>
  </div>

  <div class="card-stage" id="stage"></div>

  <div class="controls">
    <button class="nav-btn" id="prev">← Prev</button>
    <button class="shuffle-btn" id="shuffle" title="Shuffle">⤬</button>
    <button class="nav-btn" id="next">Next →</button>
  </div>

  <footer>
    Tap reveal · Swipe ←/→ · <span>Kiyori × Aki</span>
  </footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
