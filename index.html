<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiyori × Aki — Cocktail Spec Study</title>
<meta name="description" content="Flashcard study tool for cocktail specs at Kiyori and Aki, Cavendish Square, London.">
<meta name="theme-color" content="#0c0a08">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230c0a08'/%3E%3Ctext x='50' y='68' font-family='serif' font-size='60' font-weight='bold' text-anchor='middle' fill='%23d4a857'%3E清%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Shippori+Mincho:wght@400;600;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header>
    <div class="brand-mark">Kiyori × Aki</div>
    <h1>Cocktail Study</h1>
    <div class="subhead">Crystalline Serves · Spec Reference</div>
  </header>

  <!-- Venue toggle (top level) -->
  <div class="venue-toggle" id="venue-toggle"></div>

  <!-- Category filter pills -->
  <div class="filters" id="filters"></div>

  <div class="counter">
    <span><span class="position" id="pos">01</span> / <span id="total">00</span></span>
    <span id="filter-label">All Serves</span>
  </div>

  <div class="card-stage" id="stage"></div>

  <div class="controls">
    <button class="nav-btn" id="prev">← Prev</button>
    <button class="shuffle-btn" id="shuffle" title="Shuffle">⤬</button>
    <button class="nav-btn" id="next">Next →</button>
  </div>

  <footer>
    Tap card to flip · <span>Kiyori × Aki</span> · Marylebone
  </footer>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
